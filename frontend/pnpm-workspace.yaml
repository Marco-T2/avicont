# frontend/pnpm-workspace.yaml
# Configuración single-project de pnpm 11 (sin campo `packages`: este repo no usa
# workspaces reales; cada proyecto Node es independiente).

# Cero install scripts en el árbol del frontend (verificado): allowBuilds vacío
# bloquea TODO build de dependencia. Si pnpm reporta un build ignorado en
# `pnpm install` (exit 1, ERR_PNPM_IGNORED_BUILDS), NO agregar a ciegas:
# investigar el paquete primero.
allowBuilds: {}

# Cooldown de versiones nuevas (nivel de seguridad MÁXIMO). En MINUTOS.
# 4320 = 72h. Igual que backend. Una versión publicada hace < 72h no se instala.
minimumReleaseAge: 4320
minimumReleaseAgeStrict: true

# Overrides de seguridad: fuerzan la versión parcheada de dependencias
# transitivas con advisory HIGH (pnpm audit --audit-level high las bloquea).
# - form-data <4.0.6 (vía axios): GHSA-hmw2-7cc7-3qxx (CRLF injection).
# - vite 8.0.0–8.0.15: GHSA-fx2h-pf6j-xcff (server.fs.deny bypass).
# - undici 7.0.0–7.27.x (vía jsdom/vitest, solo dev): GHSA-vxpw-j846-p89q /
#   GHSA-hm92-r4w5-c3mj / TLS cert bypass. Parche 7.28.0 (maduro). Dev-only: no entra
#   al runtime del bundle. Tope <8: jsdom@29 alcanza internals de undici (wrap-handler)
#   que cambiaron en 8.x; sin el tope, el override sube a 8.x y rompe jsdom.
overrides:
  form-data: '>=4.0.6'
  vite: '>=8.0.16'
  undici: '^7.28.0'
