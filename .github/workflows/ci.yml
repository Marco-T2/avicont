name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # El backend es un proyecto Node autocontenido dentro del monorepo.
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:14
        ports: ['5432:5432']
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:6
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.11.0'
          cache: 'npm'
          # El lock vive en backend/, no en la raíz del monorepo.
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Copy env
        run: cp .env.example .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint --if-present

      - name: Unit + Integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas
          REDIS_HOST: localhost
        run: npx jest src/ --runInBand

      # E2E full-stack a través de HTTP (Supertest + AppModule). Ver CLAUDE.md §11.3.
      # --forceExit porque PrismaClient deja handles que Jest no detecta.
      - name: E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas
          REDIS_HOST: localhost
        run: npx jest test/ --runInBand --forceExit
