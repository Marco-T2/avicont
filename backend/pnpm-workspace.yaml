# backend/pnpm-workspace.yaml
# Configuración single-project de pnpm 11 (NO hay campo `packages`: este repo no
# usa workspaces reales; cada proyecto Node es independiente).

# Bloqueo de lifecycle scripts (vector #1 de supply-chain). pnpm NO corre el
# build/postinstall de una dependencia salvo que esté en `true` aquí.
# Conservador: solo los paquetes que GENUINAMENTE necesitan compilar/generar.
allowBuilds:
  # --- true: necesitan correr su build/postinstall para funcionar ---
  bcrypt: true            # binding nativo (node-gyp); sin build no hashea passwords
  prisma: true            # CLI: descarga/posiciona los query engines
  '@prisma/client': true  # postinstall genera el client tipado contra el schema
  '@prisma/engines': true # posiciona los binarios de engine de Prisma
  # --- false: postinstall de telemetría/innecesario; bloquear es seguro ---
  '@nestjs/core': false   # postinstall solo emite telemetría de instalación
  '@scarf/scarf': false   # paquete de analytics de terceros; cero valor funcional
  protobufjs: false       # postinstall innecesario para nuestro uso (OTel)
  unrs-resolver: false    # postinstall de binarios no requeridos en runtime

# Cooldown de versiones nuevas (nivel de seguridad MÁXIMO). En MINUTOS.
# 4320 = 72h. Una versión publicada hace < 72h NO se instala (la mayoría de los
# ataques de supply-chain se detectan/yankean en las primeras horas).
# Default de pnpm 11 es 1440 (24h); lo subimos a 72h.
minimumReleaseAge: 4320
# Strict: el cooldown aplica también a transitivas/peer, no solo a deps directas.
minimumReleaseAgeStrict: true

# Overrides de seguridad: fuerzan la versión parcheada de dependencias
# transitivas con advisory HIGH (pnpm audit --audit-level high las bloquea).
# - form-data <4.0.6 (vía supertest/@types/supertest): GHSA-hmw2-7cc7-3qxx (CRLF injection).
# - protobufjs <=7.6.0 (vía @nestjs/terminus>@grpc, @opentelemetry): DoS por Any expansion.
# - multer <2.2.0 (vía @nestjs/platform-express, 8 rutas): GHSA-72gw-mp4g-v24j (DoS por
#   nombres de campo profundamente anidados). El override cubre las transitivas; la dep
#   directa (devDependencies) también se subió a ^2.2.0.
overrides:
  form-data: '>=4.0.6'
  protobufjs: '>=7.6.1'
  multer: '>=2.2.0'

# Excepciones del audit gate (pnpm audit --audit-level high). Time-boxed: solo
# para advisories cuyo PARCHE existe pero aún no es instalable por nuestro propio
# minimumReleaseAge (72h). Remover en cuanto el parche madure y bumpear la dep.
# - nodemailer GHSA-p6gq-j5cr-w38f (HIGH): la opción `raw` a nivel de mensaje bypassa
#   disableFileAccess/disableUrlAccess (arbitrary file read / SSRF). NO la usamos
#   (smtp.adapter solo pasa from/to/subject/text/html/replyTo/attachments). Parche 9.0.1
#   publicado 2026-06-17, bloqueado por el cooldown hasta ~2026-06-20. ACCIÓN: al madurar,
#   bumpear nodemailer ^7→^9.0.1 (+ @types/nodemailer) y BORRAR este ignore.
auditConfig:
  ignoreGhsas:
    - GHSA-p6gq-j5cr-w38f
