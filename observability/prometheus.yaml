global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'saas-api'
    scrape_interval: 10s
    static_configs:
      # Backend corre en el host (hot-reload), no como contenedor `app`.
      # host.docker.internal resuelve al host desde la red Docker (Docker Desktop/WSL2).
      - targets: ['host.docker.internal:3000']
    metrics_path: /api/metrics
    scheme: http

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
