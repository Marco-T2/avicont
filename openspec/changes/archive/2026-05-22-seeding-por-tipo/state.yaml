implementacion: |
  El código aterrizó distribuido en dos PRs y un change compañero:

  1. PlanCuentasSeederPort + adapter + wiring en TenantsService
     PR #6, squash commit 2d8234a ("feat(tenants): seed plan de cuentas al
     crear organización según módulo"). Entregó: CreateTenantDto con campo
     modulo, TenantsService.create en TX con switch, PlanCuentasSeederPort en
     cuentas/ports/, PrismaPlanCuentasSeederAdapter en cuentas/adapters/,
     firma de comercial.ts ampliada a PrismaClient | Prisma.TransactionClient.
     En este PR la rama CONTABILIDAD llamaba solo al plan de cuentas (Opción 1
     de deferral confirmada al aplicar).

  2. TipoDocumentoFisicoSeederPort + adapter (change documento-fisico)
     PR #12, squash commit 3002f26 ("feat(documento-fisico): catálogo de tipos,
     documentos físicos y asociación con comprobantes"). Entregó el
     PrismaTiposDocumentoFisicoSeederAdapter y su wiring en TenantsModule; al
     aplicarse, el case CONTABILIDAD de tenants.service.ts pasó a invocar AMBOS
     seeders (planCuentasSeeder + tiposDocSeeder) en la misma TX, superando la
     Opción 1 de deferral. Verificado en tenants.service.integration.spec.ts:
     tipoDocumentoFisico.count === 8 para org CONTABILIDAD (además de 111 cuentas).

  3. Relocate de comercial.ts a src/ (fix Docker)
     Branch fix/infra-build-output-dist-main (PR #21 pendiente de merge al momento
     del archive). Commit 13db4c9: mueve el archivo de
     prisma/seeds/prod/planes-cuentas/comercial.ts a
     src/cuentas/adapters/seed/comercial.ts para que nest build emita dist/main.js
     en lugar de dist/src/main.js. El adapter prisma-plan-cuentas-seeder.adapter.ts
     actualiza su import en consecuencia.

